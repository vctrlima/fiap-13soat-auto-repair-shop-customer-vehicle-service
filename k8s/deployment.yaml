apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-vehicle-service
  labels:
    app: customer-vehicle-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-vehicle-service
  template:
    metadata:
      labels:
        app: customer-vehicle-service
    spec:
      serviceAccountName: auto-repair-shop-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: customer-vehicle-service
          image: auto-repair-shop/customer-vehicle-service:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: customer-vehicle-service-config
            - secretRef:
                name: customer-vehicle-service-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
